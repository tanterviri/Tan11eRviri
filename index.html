<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TANTERcreativity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f5f5;
      background: #000000;
    }

    /* Шапка */
    .hero {
      min-height: 50vh;
      background: url("images/hero.jpg") center/cover no-repeat #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px 30px;
      border-radius: 16px;
      max-width: 90%;
    }

    .hero h1 {
      font-size: 52px;
      letter-spacing: 0.15em;
      margin: 0;
    }

    .hero p {
      margin-top: 10px;
      margin-bottom: 0;
      color: #aaaaaa;
    }

    /* Фон ниже — темный градиент */
    main {
      background: linear-gradient(to bottom, #101010 0%, #1b1b1b 50%, #252525 100%);
    }

    .section {
      padding: 40px 20px;
    }

    .section h2 {
      margin-top: 0;
    }

    .dark-1 {
      background: rgba(20, 20, 20, 0.9);
    }

    .dark-2 {
      background: rgba(35, 35, 35, 0.9);
    }

    /* Контейнер для кнопок */
    .contacts-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    /* Галерея картинок (дефолт для десктопа) */
    .gallery {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 16px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      background: #2a2a2a;
    }

    /* Кнопки */
    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #45a049;
    }

    /* ===== АДАПТИВ ===== */

    /* Планшеты */
    @media (max-width: 1024px) {
      .gallery {
        grid-template-columns: repeat(3, minmax(100px, 1fr));
      }
    }

    /* Малые планшеты / большие телефоны */
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .hero h1 {
        font-size: 40px;
        letter-spacing: 0.1em;
      }

      .section {
        padding: 32px 16px;
      }
    }

    /* Телефоны */
    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
        letter-spacing: 0.08em;
      }

      .hero-content {
        padding: 16px 18px;
      }

      .section {
        padding: 24px 16px;
      }

      .contacts-buttons {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>TANTERcreativity</h1>
      <p>Творчество в темных тонах</p>
    </div>
  </div>

  <main>
    <!-- ПЕРВАЯ секция: контакты -->
    <section class="section dark-1">
      <h2>Связаться со мной</h2>
      <p>Выбери удобный способ, чтобы отправить свои работы.</p>

      <div class="contacts-buttons">
        <button onclick="window.open('https://t.me/Tannter', '_blank')">Telegram</button>
        <button onclick="window.open('https://vk.com/tannter', '_blank')">VK</button>
      </div>
    </section>

    <!-- ВТОРАЯ секция: авто-галерея из images.json -->
    <section class="section dark-2">
      <h2>Галерея работ</h2>
    

      <div class="gallery" id="autoGallery">
        <!-- Сюда JS сам добавит картинки -->
      </div>
    </section>
  </main>

  <script>
    async function loadGallery() {
      try {
        const response = await fetch('images/images.json');
        if (!response.ok) {
          console.error('Не могу получить images.json', response.status);
          return;
        }

        const files = await response.json(); // массив имён файлов
        const container = document.getElementById('autoGallery');
        container.innerHTML = '';

        files.forEach((fileName) => {
          const img = document.createElement('img');
          img.src = 'images/' + fileName;
          img.alt = fileName;
          img.className = 'slot';
          container.appendChild(img);
        });
      } catch (e) {
        console.error('Ошибка при загрузке галереи', e);
      }
    }

    loadGallery();
  </script>
</body>
</html>
