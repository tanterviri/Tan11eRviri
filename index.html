<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TANTERcreativity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f5f5;
      background: #000000;
    }

    /* Шапка */
    .hero {
      min-height: 50vh;
      background: url("images/hero.jpg") center/cover no-repeat #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    /* Карточка под текст в шапке */
    .hero-content {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px 30px;
      border-radius: 16px;
      max-width: 90%;
    }

    .hero h1 {
      font-size: 52px;
      letter-spacing: 0.15em;
      margin: 0;
    }

    .hero p {
      margin-top: 10px;
      margin-bottom: 0;
      color: #aaaaaa;
    }

    /* Фон ниже — темный градиент */
    main {
      background: linear-gradient(to bottom, #101010 0%, #1b1b1b 50%, #252525 100%);
    }

    .section {
      padding: 40px 20px;
    }

    .section h2 {
      margin-top: 0;
    }

    .dark-1 {
      background: rgba(20, 20, 20, 0.9);
    }

    .dark-2 {
      background: rgba(35, 35, 35, 0.9);
    }

    /* Контейнер для кнопок */
    .contacts-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    /* Галерея 8 картинок */
    .gallery {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 16px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      background: #2a2a2a;
    }

    /* Кнопки */
    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>TANTERcreativity</h1>
      <p>Творчество в ваших деталях</p>
    </div>
  </div>

  <main>
    <!-- ПЕРВАЯ секция: переходы в Telegram и VK -->
    <section class="section dark-1">
      <h2>Связаться со мной</h2>
      <p>Выбери удобный способ, чтобы отправить свои работы.</p>

      <div class="contacts-buttons">
        <button id="addPhotoBtnTelegram">Добавить фото (Telegram)</button>
        <button id="addPhotoBtnVK">Добавить фото (VK)</button>
      </div>
    </section>

    <!-- ВТОРАЯ секция: фиксированная галерея на 8 картинок -->
    <section class="section dark-2">
      <h2>Галерея работ</h2>
      <p>Слоты галереи можно заполнить через редактор или напрямую из localStorage.</p>

      <div class="gallery" id="fixedGallery">
        <img class="slot" data-slot="1" src="" alt="Work 1">
        <img class="slot" data-slot="2" src="" alt="Work 2">
        <img class="slot" data-slot="3" src="" alt="Work 3">
        <img class="slot" data-slot="4" src="" alt="Work 4">
        <img class="slot" data-slot="5" src="" alt="Work 5">
        <img class="slot" data-slot="6" src="" alt="Work 6">
        <img class="slot" data-slot="7" src="" alt="Work 7">
        <img class="slot" data-slot="8" src="" alt="Work 8">
      </div>
    </section>
  </main>

  <script>
    const TELEGRAM_URL = 'https://t.me/Tannter';
    const VK_URL = 'https://vk.com/tannter';
    const STORAGE_KEY = 'tanter_gallery_urls';

    // Кнопка "Добавить фото (Telegram)"
    const addPhotoBtnTelegram = document.getElementById('addPhotoBtnTelegram');
    if (addPhotoBtnTelegram) {
      addPhotoBtnTelegram.addEventListener('click', () => {
        window.open(TELEGRAM_URL, '_blank');
      });
    }

    // Кнопка "Добавить фото (VK)"
    const addPhotoBtnVK = document.getElementById('addPhotoBtnVK');
    if (addPhotoBtnVK) {
      addPhotoBtnVK.addEventListener('click', () => {
        window.open(VK_URL, '_blank');
      });
    }

    // Подгрузка ссылок для 8 слотов из localStorage
    function loadGalleryFromStorage() {
      const json = localStorage.getItem(STORAGE_KEY);
      if (!json) return;

      let urls;
      try {
        urls = JSON.parse(json);
      } catch (e) {
        console.error('Ошибка JSON в localStorage', e);
        return;
      }

      const slots = document.querySelectorAll('#fixedGallery .slot');
      slots.forEach((img, index) => {
        const url = urls[index];
        if (url && typeof url === 'string' && url.trim() !== '') {
          img.src = url;
        } else {
          img.src = '';
        }
      });
    }

    loadGalleryFromStorage();
  </script>
</body>
</html>
